<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>bigcat Vowel Monster Game</title>

  <style>
    :root{
      --bg:#fff;
      --ink:#111;
      --shadow: rgba(0,0,0,0.12);
    }

    html,body{
      margin:0; padding:0;
      width:100%; height:100%;
      overflow:hidden;
      background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      touch-action: manipulation;
    }

    #game-stage{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:#fff;
      padding-bottom:190px; /* 캐릭터 바 */
      box-sizing:border-box;
    }

    /* 상단 UI */
    #score-board{
      position:absolute;
      top:10px;
      width:100%;
      text-align:center;
      font-size:22px;
      font-weight:900;
      z-index:10;
      color:#111;
      user-select:none;
    }

    #admin-open-btn, #bgm-toggle-btn{
      position:absolute;
      top:10px;
      z-index:11;
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:2px solid #111;
      background:#fff;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,0.08);
    }
    #bgm-toggle-btn{ left:10px; }
    #admin-open-btn{ right:10px; }

    /* 결과 이모지 */
    #result-icon{
      position:absolute;
      top:48%;
      left:50%;
      transform:translate(-50%,-50%) scale(0);
      font-size:86px;
      pointer-events:none;
      transition:transform .2s ease-out, opacity .2s ease-out;
      opacity:0;
      z-index:20;
      filter: drop-shadow(0 6px 0 rgba(0,0,0,0.08));
    }

    /* 떨어지는 단어 */
    .word-item{
      position:absolute;
      padding:14px 26px;
      background:#fff;
      border:5px solid #111;
      border-radius:22px;
      font-weight:1000;
      font-size:22px;
      cursor:pointer;
      box-shadow:0 10px 0 var(--shadow);
      -webkit-tap-highlight-color:transparent;
      user-select:none;
      letter-spacing:.5px;
      transform-origin:center;
      pointer-events:auto;
    }
    .word-item:active{ transform:translateY(3px) scale(.98); }

    /* ✅ 하단 캐릭터 바 */
    #characterBar{
      position:absolute;
      left:0; right:0; bottom:0;
      height:190px;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      pointer-events:none;
      z-index:15;
      background:linear-gradient(to top, rgba(0,0,0,0.03), rgba(0,0,0,0.0));
    }

    #characterWrap{
      position:relative;
      width:100%;
      height:190px;
      pointer-events:none;
    }

    /* ✅ 캐릭터는 좌우 이동하므로 absolute */
    #character{
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:190px;
      height:auto;
      filter:drop-shadow(0 10px 0 rgba(0,0,0,0.08));
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    /* ✅ 얼굴 이모지 오버레이(입술/해골) */
    #faceOverlay{
      position:absolute;
      bottom:108px;   /* 얼굴 위치 미세 조정 */
      left:50%;
      transform:translateX(-50%);
      font-size:54px;
      opacity:0;
      pointer-events:none;
      filter: drop-shadow(0 4px 0 rgba(0,0,0,0.08));
      transition: opacity 120ms ease;
      z-index:2;
    }

    /* 팔(원하면 유지) */
    #arm{
      position:absolute;
      bottom:92px;
      left:56%;
      height:18px;
      width:0px;
      background:#ffd8b0;
      border:4px solid #111;
      border-radius:999px;
      transform-origin:left center;
      opacity:0;
      pointer-events:none;
      z-index:1;
    }

    /* 드래그 가능한 영역 표시(안 보이게) */
    #dragPad{
      position:absolute;
      left:0; right:0;
      bottom:0;
      height:190px;
      pointer-events:auto; /* ✅ 여기는 드래그 받기 */
      background:transparent;
      z-index:16; /* 캐릭터바 위에서 드래그 */
      touch-action:none; /* ✅ 드래그 부드럽게 */
    }

    /* 관리자 모달 */
    #admin-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:30;
    }

    #admin-panel{
      background:#fff;
      border-radius:14px;
      max-width:480px;
      width:92%;
      padding:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      font-size:14px;
      border:2px solid rgba(0,0,0,0.08);
    }
    #admin-panel h2{ margin:0 0 8px; font-size:18px; }
    #admin-panel h3{ margin:12px 0 4px; font-size:14px; }
    #admin-panel small{ color:#666; }

    .admin-textarea{
      width:100%;
      height:100px;
      margin-top:4px;
      box-sizing:border-box;
      font-family:inherit;
      font-size:13px;
      padding:8px;
      border-radius:10px;
      border:2px solid #111;
      outline:none;
    }

    #admin-note{
      margin-top:6px;
      font-size:12px;
      color:#444;
      line-height:1.4;
    }

    #admin-buttons{
      margin-top:10px;
      display:flex;
      justify-content:flex-end;
      gap:8px;
    }

    #admin-buttons button{
      padding:8px 12px;
      font-size:13px;
      border-radius:10px;
      border:2px solid #111;
      cursor:pointer;
      font-weight:800;
      box-shadow:0 6px 0 rgba(0,0,0,0.08);
      background:#fff;
    }

    #admin-save-btn{
      background:#4caf50;
      color:#fff;
      border-color:#4caf50;
    }
    #admin-close-btn{ background:#eee; }

    #vowel-select-row{
      margin-bottom:6px;
      font-size:13px;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }

    #vowel-select-row select{
      font-size:13px;
      padding:4px 8px;
      border-radius:10px;
      border:2px solid #111;
      font-weight:800;
    }

    #custom-vowel-input{
      width:36px;
      text-transform:uppercase;
      text-align:center;
      border-radius:10px;
      border:2px solid #111;
      padding:4px 6px;
      font-weight:900;
    }
  </style>
</head>

<body>
  <div id="game-stage">
    <div id="score-board">
      SCORE: <span id="score">0</span><br/>
      <span id="lives">❤️❤️❤️</span>
    </div>

    <button id="bgm-toggle-btn">🔊 BGM</button>
    <button id="admin-open-btn">관리자</button>

    <!-- ✅ 하단 캐릭터 -->
    <div id="characterBar">
      <div id="characterWrap">
        <div id="faceOverlay">💋</div>
        <img id="character" src="character.jpg" alt="character">
        <div id="arm"></div>
      </div>

      <!-- ✅ 드래그 패드 (손가락으로 좌우 이동) -->
      <div id="dragPad" aria-label="drag to move"></div>
    </div>

    <div id="result-icon"></div>
  </div>

  <!-- 효과음 + 배경 음악 -->
  <audio id="sfx-correct" src="correct.mp3" preload="auto"></audio>
  <audio id="sfx-wrong"   src="wrong.mp3" preload="auto"></audio>
  <audio id="bgm-audio"   src="bgm_happy.mp3" preload="auto" loop></audio>

  <!-- 관리자 모달 -->
  <div id="admin-modal">
    <div id="admin-panel">
      <h2>단어 & 모음 관리</h2>

      <div id="vowel-select-row">
        <span>타겟 모음:</span>
        <select id="vowel-select">
          <option value="A">A</option>
          <option value="E">E</option>
          <option value="I">I</option>
          <option value="O">O</option>
          <option value="U">U</option>
          <option value="CUSTOM">커스텀</option>
        </select>
        <input id="custom-vowel-input" maxlength="1" placeholder="V" />
      </div>

      <small>선택한 모음이 들어 있는 단어만 정답(타겟)으로 처리됩니다.</small>

      <h3>타겟 단어 (모음 포함)</h3>
      <textarea id="target-textarea" class="admin-textarea"></textarea>

      <h3>기타 단어 (모음 미포함)</h3>
      <textarea id="other-textarea" class="admin-textarea"></textarea>

      <div id="admin-note">
        · 타겟 단어: 선택한 모음이 들어 있는 단어 (만나면 정답 처리)<br />
        · 기타 단어: 그 모음이 없는 단어 (만나면 오답 처리)
      </div>

      <div id="admin-buttons">
        <button id="admin-close-btn">닫기</button>
        <button id="admin-save-btn">저장</button>
      </div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('game-stage');
    const scoreDisplay = document.getElementById('score');
    const livesDisplay = document.getElementById('lives');
    const resultIcon = document.getElementById('result-icon');

    const adminOpenBtn = document.getElementById('admin-open-btn');
    const adminModal = document.getElementById('admin-modal');
    const adminCloseBtn = document.getElementById('admin-close-btn');
    const adminSaveBtn = document.getElementById('admin-save-btn');
    const targetTextarea = document.getElementById('target-textarea');
    const otherTextarea = document.getElementById('other-textarea');

    const vowelSelect = document.getElementById('vowel-select');
    const customVowelInput = document.getElementById('custom-vowel-input');

    const bgmToggleBtn = document.getElementById('bgm-toggle-btn');

    const correctSound = document.getElementById('sfx-correct');
    const wrongSound = document.getElementById('sfx-wrong');
    const bgmAudio = document.getElementById('bgm-audio');

    // 캐릭터 이동 요소
    const characterWrap = document.getElementById('characterWrap');
    const characterImg = document.getElementById('character');
    const faceOverlay = document.getElementById('faceOverlay');
    const arm = document.getElementById('arm');
    const dragPad = document.getElementById('dragPad');

    let soundEnabled = false;
    let bgmEnabled = true;

    let score = 0;
    let lives = 3;
    let isGameOver = false;
    let gameTimer = null;

    // 모음 세팅
    let currentVowel = 'A';

    const defaultWordSets = {
      A: { target:["APPLE","ANT","AX","ALLIGATOR","AQUA","BANANA","CAKE","DANCE","EAGLE","FACE","GAME"],
           other:["BLUE","DOG","FISH","ICE","MOON","SUN","TREE","RED","PIG","HEN"] },
      E: { target:["EGG","ELEPHANT","ENVELOPE","ENGINE","EEL","BED","LEG","TEETH","SHEEP","RED","PEN","NET","WEB"],
           other:["DOG","CAT","SUN","MOON","PIG","BUS","CUP","HAT","BOOK"] },
      I: { target:["INK","IGLOO","INSECT","ITALY","IRON","PIG","FISH","MILK","KING","HILL","LIP","RING","ZIP"],
           other:["DOG","CAT","SUN","MOON","BED","CUP","BALL","FOX","DUCK"] },
      O: { target:["OCTOPUS","ORANGE","OSTRICH","ONION","OLIVE","DOG","BOX","FROG","CORN","DOT","POT","TOP","MOP","ROCK"],
           other:["CAT","PEN","TREE","HILL","SUN","BEE","MILK","FAN","CUP"] },
      U: { target:["UMBRELLA","UNICORN","UP","UNDER","USB","SUN","BUS","CUP","BUG","MUD","NUT","GUM","TUB","PUP"],
           other:["DOG","CAT","BED","PEN","MOON","TREE","FOX","PIG","HAT"] },
    };

    let targetWords = [];
    let otherWords = [];
    const STORAGE_KEY = 'vowel_monster_settings';

    function loadSettings(){
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved){
        try{
          const obj = JSON.parse(saved);
          if(obj){
            if(obj.vowel) currentVowel = obj.vowel;
            if(obj.wordSets && obj.wordSets[currentVowel]){
              targetWords = obj.wordSets[currentVowel].target || [];
              otherWords  = obj.wordSets[currentVowel].other  || [];
            }
          }
        }catch(e){}
      }
      if(!targetWords.length || !otherWords.length){
        const base = defaultWordSets[currentVowel] || defaultWordSets.A;
        targetWords = base.target.slice();
        otherWords  = base.other.slice();
      }
      if(['A','E','I','O','U'].includes(currentVowel)){
        vowelSelect.value = currentVowel;
        customVowelInput.value = '';
      }else{
        vowelSelect.value = 'CUSTOM';
        customVowelInput.value = currentVowel;
      }
    }

    function saveSettings(){
      let data = { vowel: currentVowel, wordSets: {} };
      const saved = localStorage.getItem(STORAGE_KEY);
      if(saved){
        try{
          const obj = JSON.parse(saved);
          if(obj && obj.wordSets) data.wordSets = obj.wordSets;
        }catch(e){}
      }
      data.wordSets[currentVowel] = { target: targetWords, other: otherWords };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function openAdminModal(){
      targetTextarea.value = targetWords.join('\n');
      otherTextarea.value  = otherWords.join('\n');
      adminModal.style.display = 'flex';
    }
    function closeAdminModal(){ adminModal.style.display = 'none'; }
    adminOpenBtn.addEventListener('click', openAdminModal);
    adminCloseBtn.addEventListener('click', closeAdminModal);

    vowelSelect.addEventListener('change', () => {
      const sel = vowelSelect.value;
      if(sel === 'CUSTOM'){
        customVowelInput.focus();
      }else{
        currentVowel = sel;
        targetWords = []; otherWords = [];
        loadSettings();
        targetTextarea.value = targetWords.join('\n');
        otherTextarea.value = otherWords.join('\n');
      }
    });

    customVowelInput.addEventListener('input', () => {
      let v = customVowelInput.value.toUpperCase().replace(/[^A-Z]/g,'');
      if(v.length > 1) v = v[0];
      customVowelInput.value = v;
      if(v){
        currentVowel = v;
        targetWords = []; otherWords = [];
        loadSettings();
        targetTextarea.value = targetWords.join('\n');
        otherTextarea.value = otherWords.join('\n');
      }
    });

    adminSaveBtn.addEventListener('click', () => {
      const tLines = targetTextarea.value.split('\n').map(v=>v.trim().toUpperCase()).filter(v=>v);
      const oLines = otherTextarea.value.split('\n').map(v=>v.trim().toUpperCase()).filter(v=>v);

      if(!tLines.length){ alert('타겟 단어를 최소 1개 이상 입력해주세요.'); return; }
      if(!oLines.length){ alert('기타 단어를 최소 1개 이상 입력해주세요.'); return; }

      targetWords = tLines; otherWords = oLines;
      saveSettings();
      closeAdminModal();
      alert('설정이 저장되었습니다.\n선택한 모음에 맞는 단어로 게임이 진행됩니다.');
    });

    /* 사운드 unlock + BGM */
    function initSoundOnce(){
      if(soundEnabled) return;
      soundEnabled = true;

      [correctSound, wrongSound, bgmAudio].forEach(a=>{
        if(!a) return;
        a.volume = (a === bgmAudio) ? 0.4 : 1.0;
      });

      [correctSound, wrongSound, bgmAudio].forEach(a=>{
        if(!a) return;
        a.play().then(()=>{
          a.pause();
          a.currentTime = 0;
        }).catch(()=>{});
      });

      if(bgmEnabled){
        bgmAudio.currentTime = 0;
        bgmAudio.play().catch(()=>{});
      }

      document.removeEventListener('touchstart', initSoundOnce);
      document.removeEventListener('click', initSoundOnce);
    }
    document.addEventListener('touchstart', initSoundOnce, { once:true });
    document.addEventListener('click', initSoundOnce, { once:true });

    bgmToggleBtn.addEventListener('click', () => {
      if(!soundEnabled) initSoundOnce();
      bgmEnabled = !bgmEnabled;
      if(bgmEnabled){
        bgmAudio.currentTime = 0;
        bgmAudio.play().catch(()=>{});
        bgmToggleBtn.textContent = "🔊 BGM";
      }else{
        bgmAudio.pause();
        bgmToggleBtn.textContent = "🔈 BGM OFF";
      }
    });

    function playCorrectSound(){
      if(!soundEnabled || !correctSound) return;
      correctSound.currentTime = 0;
      correctSound.play().catch(()=>{});
    }
    function playWrongSound(){
      if(!soundEnabled || !wrongSound) return;
      wrongSound.currentTime = 0;
      wrongSound.play().catch(()=>{});
    }
    function showResultIcon(type){
      resultIcon.textContent = (type === 'correct') ? '💖' : '💀';
      resultIcon.style.opacity = '1';
      resultIcon.style.transform = 'translate(-50%, -50%) scale(1.2)';
      setTimeout(()=>{
        resultIcon.style.opacity='0';
        resultIcon.style.transform='translate(-50%, -50%) scale(0)';
      }, 400);
    }

    /* ✅ 얼굴 바꾸기(정답=💋 / 오답=💀) */
    let faceTimer = null;
    function setFace(type){
      // type: 'kiss' | 'skull' | 'clear'
      if(faceTimer) clearTimeout(faceTimer);

      if(type === 'kiss'){
        faceOverlay.textContent = '💋';
        faceOverlay.style.opacity = '1';
        faceTimer = setTimeout(()=> faceOverlay.style.opacity = '0', 500);
      }else if(type === 'skull'){
        faceOverlay.textContent = '💀';
        faceOverlay.style.opacity = '1';
        faceTimer = setTimeout(()=> faceOverlay.style.opacity = '0', 650);
      }else{
        faceOverlay.style.opacity = '0';
      }
    }

    /* ✅ 캐릭터 좌우 이동 (드래그 + 방향키) */
    let charX = window.innerWidth / 2; // 캐릭터 중심 x
    const charHalf = 95;              // 이미지 절반 폭(190/2)
    const moveSpeed = 8;              // 키보드 속도
    let keyLeft = false, keyRight = false;

    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

    function setCharacterX(x){
      // 화면 밖으로 안 나가게
      const minX = charHalf + 10;
      const maxX = window.innerWidth - charHalf - 10;
      charX = clamp(x, minX, maxX);
      characterImg.style.left = charX + 'px';
      characterImg.style.transform = 'translateX(-50%)';
      faceOverlay.style.left = charX + 'px';
      faceOverlay.style.transform = 'translateX(-50%)';
      // 팔도 같이 이동(arm은 wrap 기준이므로 left는 그대로 둬도 ok)
    }

    // 초기 위치 세팅
    function resetCharacterPosition(){
      setCharacterX(window.innerWidth / 2);
    }
    window.addEventListener('resize', resetCharacterPosition);
    resetCharacterPosition();

    // 드래그 이동
    let dragging = false;
    let dragOffset = 0;

    dragPad.addEventListener('pointerdown', (e)=>{
      e.preventDefault();
      dragging = true;
      if(!soundEnabled) initSoundOnce(); // 드래그 시작도 사용자 제스처라 사운드 unlock 가능
      // 터치한 지점으로 바로 따라오게(오프셋 0)
      dragOffset = 0;
      dragPad.setPointerCapture(e.pointerId);
    });

    dragPad.addEventListener('pointermove', (e)=>{
      if(!dragging) return;
      setCharacterX(e.clientX - dragOffset);
    });

    dragPad.addEventListener('pointerup', (e)=>{
      dragging = false;
      try{ dragPad.releasePointerCapture(e.pointerId); }catch(_){}
    });

    dragPad.addEventListener('pointercancel', ()=>{
      dragging = false;
    });

    // 키보드 이동(PC)
    window.addEventListener('keydown', (e)=>{
      if(e.key === 'ArrowLeft') keyLeft = true;
      if(e.key === 'ArrowRight') keyRight = true;
      if((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !soundEnabled){
        initSoundOnce();
      }
    });
    window.addEventListener('keyup', (e)=>{
      if(e.key === 'ArrowLeft') keyLeft = false;
      if(e.key === 'ArrowRight') keyRight = false;
    });

    function keyboardLoop(){
      if(isGameOver){ requestAnimationFrame(keyboardLoop); return; }
      if(keyLeft) setCharacterX(charX - moveSpeed);
      if(keyRight) setCharacterX(charX + moveSpeed);
      requestAnimationFrame(keyboardLoop);
    }
    requestAnimationFrame(keyboardLoop);

    /* ✅ 충돌 체크: 캐릭터가 단어를 "만나면" 처리 */
    function checkCollision(wordNode){
      const rect = wordNode.getBoundingClientRect();

      // 캐릭터 입 위치(대충 캐릭터 상단 기준으로)
      const mouthY = window.innerHeight - 120; // 하단 캐릭터 바 기준(필요하면 조절)
      const mouthX = charX;

      // 단어 중심
      const cx = rect.left + rect.width/2;
      const cy = rect.top + rect.height/2;

      const dx = cx - mouthX;
      const dy = cy - mouthY;

      // 히트 범위(원형)
      const hitR = 70;
      return (dx*dx + dy*dy) <= hitR*hitR;
    }

    function spawnWord(){
      if(isGameOver) return;
      if(!targetWords.length || !otherWords.length) return;

      const isTarget = Math.random() < 0.5;
      const wordText = isTarget
        ? targetWords[Math.floor(Math.random() * targetWords.length)]
        : otherWords[Math.floor(Math.random() * otherWords.length)];

      const wordNode = document.createElement('div');
      wordNode.className = 'word-item';
      wordNode.innerText = wordText;
      wordNode.dataset.isTarget = isTarget ? '1' : '0';

      const posX = Math.random() * (window.innerWidth - 160);
      wordNode.style.left = posX + 'px';
      wordNode.style.top = '-80px';
      stage.appendChild(wordNode);

      let currentY = -80;
      const speed = 2 + Math.min(score * 0.1, 6);

      const moveInterval = setInterval(()=>{
        if(isGameOver){
          clearInterval(moveInterval);
          wordNode.remove();
          return;
        }

        currentY += speed;
        wordNode.style.top = currentY + 'px';

        // ✅ 캐릭터와 충돌하면 자동 판정
        if(checkCollision(wordNode)){
          handleMeet(wordNode, isTarget);
          clearInterval(moveInterval);
          wordNode.remove();
          return;
        }

        // 바닥(캐릭터 영역 위) 도달
        const bottomLimit = window.innerHeight - 210;
        if(currentY > bottomLimit){
          if(isTarget) reduceLife();
          clearInterval(moveInterval);
          wordNode.remove();
        }
      }, 16);

      // 클릭으로도 먹을 수 있게(선택사항) — 원하면 삭제 가능
      function handleTap(e){
        e.preventDefault();
        e.stopPropagation();
        if(!soundEnabled) initSoundOnce();
        handleMeet(wordNode, isTarget);
        clearInterval(moveInterval);
        wordNode.remove();
      }
      wordNode.addEventListener('pointerdown', handleTap);
      wordNode.addEventListener('touchstart', handleTap);
      wordNode.addEventListener('click', handleTap);
    }

    function handleMeet(wordNode, isTarget){
      if(isTarget){
        score += 10;
        scoreDisplay.innerText = score;
        showResultIcon('correct');
        playCorrectSound();
        setFace('kiss');   // ✅ 정답이면 💋
      }else{
        reduceLife();
        showResultIcon('wrong');
        playWrongSound();
        setFace('skull');  // ✅ 오답이면 💀
      }
    }

    function reduceLife(){
      lives--;
      livesDisplay.innerText = "❤️".repeat(lives) + "🖤".repeat(3 - lives);

      if(lives <= 0){
        isGameOver = true;
        setTimeout(()=>{
          alert("GAME OVER!\n최종 점수: " + score);
          location.reload();
        }, 100);
      }
    }

    loadSettings();
    gameTimer = setInterval(spawnWord, 1200);
  </script>
</body>
</html>
